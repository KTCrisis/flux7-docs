site_name: flux7 docs
site_url: https://docs.flux7.art
site_description: Documentation for flux7-mesh, flux7-memory, flux7-supervisor, and flux7-console — governance infrastructure for AI agents
site_author: Marc Verchiani

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: flux7
  font: false
  favicon: assets/favicon.svg
  icon:
    logo: material/console
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/flux7.css
  - https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list

nav:
  - Home: index.md
  - flux7-mesh:
    - Overview: mesh7/index.md
    - Getting Started: mesh7/getting-started.md
    - Writing Policies: mesh7/writing-policies.md
    - Approval Flow: mesh7/approval-flow.md
    - CLI Tools: mesh7/cli-tools.md
    - Memory Integration: mesh7/mem7-auto-approve.md
    - Supervisor Protocol: mesh7/supervisor-protocol.md
    - Deployment Modes: mesh7/deployment-modes.md
    - Observability: mesh7/otel.md
  - flux7-memory:
    - Overview: mem7/index.md
  - flux7-supervisor:
    - Overview: sup7/index.md
    - Configuration: sup7/configuration.md
    - Claude Code Callback: sup7/claude-code-callback.md
  - flux7-console:
    - Overview: console/index.md
    - System Design: console/system-design.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/KTCrisis
