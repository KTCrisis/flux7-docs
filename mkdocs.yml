site_name: flux7 docs
site_url: https://docs.flux7.art
site_description: Documentation for agent-mesh, mem7, and agent7 — governance infrastructure for AI agents
site_author: Marc Verchiani

theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: flux7
  font: false
  favicon: assets/favicon.svg
  icon:
    logo: material/console
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/flux7.css
  - https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list

nav:
  - Home: index.md
  - agent-mesh:
    - Overview: agent-mesh/index.md
    - Getting Started: agent-mesh/getting-started.md
    - Writing Policies: agent-mesh/writing-policies.md
    - Approval Flow: agent-mesh/approval-flow.md
    - CLI Tools: agent-mesh/cli-tools.md
    - Memory Integration: agent-mesh/mem7-auto-approve.md
    - Supervisor Protocol: agent-mesh/supervisor-protocol.md
    - Deployment Modes: agent-mesh/deployment-modes.md
    - Observability: agent-mesh/otel.md
  - mem7:
    - Overview: mem7/index.md
  - agent7:
    - Overview: agent7/index.md
    - System Design: agent7/system-design.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/KTCrisis
